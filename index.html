<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/index.css" />
        <script src="js/index.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <title>Voravit Supak</title>
    </head>
    <body>
        <div class="content-warpper">
            <div class="bg-profile">
                <img
                    class="profile"
                    src="https://bio.linkcdn.cc/upload/2025022412/174039879706356315.jpg"
                    art="profile"
                />
            </div>
            <div class="username">
                <p>Voravit Supak</p>
                <img
                    class="verify"
                    src="https://img2.pic.in.th/1000606663.png"
                    alt="verify"
                />
            </div>
            <div>
                <div
                    class="fb"
                    onclick="window.open('https://www.facebook.com/share/1MMkZb18dK/', '_blank');"
                >
                    <img class="logo" src="/icon/facebook.png" alt="Facebook" />
                    <a>Facebook</a>
                </div>
                <div
                    class="ig"
                    onclick="window.open('https://www.instagram.com/voravit_supak?igsh=ZmJudHQ2ajdmOXU4', '_blank');"
                >
                    <img
                        class="logo"
                        src="/icon/instagram.png"
                        alt="instargram"
                    />
                    <a>instargram</a>
                </div>
                <div
                    class="git"
                    onclick="window.open('https://github.com/Voravit09', '_blank');"
                >
                    <img class="logo" src="/icon/github.png" alt="Github" />
                    <a>Github</a>
                </div>
                <div
                    class="dis"
                    onclick="window.open('https://discord.gg/qUV7AKt3', '_blank');"
                >
                    <img class="logo" src="/icon/discord.png" alt="Discord" />
                    <a>Discord</a>
                </div>
            </div>
        </div>
        <div class="bg-blur-layer"></div>
        <body></body>
    </body>
</html>
